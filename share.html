<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Share SprinkFlow with a colleague</title>
  <meta name="description" content="Invite another fire sprinkler designer to try SprinkFlow free during the beta." />
  <meta name="theme-color" content="#0d1116" />
  <link rel="icon" href="./assets/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .share-wrap { max-width: 640px; margin: 0 auto; padding: 40px 22px 80px; }
    .share-wrap h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); margin: 0 0 10px; }
    .share-wrap .lead { color: var(--muted); font-size: 1.1rem; }
    .msg { width: 100%; min-height: 150px; background: var(--surface); border: 1px solid var(--line-strong); border-radius: 12px; color: var(--ink); padding: 14px; font: inherit; font-size: 1rem; line-height: 1.5; margin: 18px 0 12px; }
    .share-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .share-btns a, .share-btns button { width: 100%; }
    .copied { color: var(--ok); font-weight: 600; margin-top: 10px; min-height: 1.2em; }
  </style>
</head>
<body>
  <header class="nav">
    <a class="brand" href="/"><img src="./assets/logo.png" alt="" class="brand-mark" /><span class="brand-name">SprinkFlow</span></a>
    <a href="/#signup" class="btn btn-primary btn-sm">Get the beta</a>
  </header>

  <main class="share-wrap">
    <h1>Know another designer who'd use this?</h1>
    <p class="lead">SprinkFlow is free during the beta. If it's saved you time, send it to someone on your crew — they get the same free access.</p>

    <textarea class="msg" id="msg">Found a tool worth sharing. SprinkFlow turns your fire sprinkler plans into a finished material submittal in seconds, plus free calculators (storage hazard, spacing, water supply) on desktop and mobile. It's free during the beta right now: https://sprinkflow.studio</textarea>
    <button class="btn btn-ghost" id="copyBtn" type="button">Copy message</button>
    <div class="copied" id="copied"></div>

    <div class="share-btns" style="margin-top:18px">
      <a class="btn btn-primary" id="emailBtn" href="#">Share by email</a>
      <a class="btn btn-ghost" id="smsBtn" href="#">Share by text</a>
    </div>
    <div class="share-btns" style="margin-top:12px">
      <a class="btn btn-ghost" target="_blank" rel="noopener" href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fsprinkflow.studio">Share on Facebook</a>
      <a class="btn btn-ghost" target="_blank" rel="noopener" href="https://www.linkedin.com/sharing/share-offsite/?url=https%3A%2F%2Fsprinkflow.studio">Share on LinkedIn</a>
    </div>
  </main>

  <script>
    const msg = () => document.getElementById("msg").value;
    const enc = s => encodeURIComponent(s);
    document.getElementById("copyBtn").addEventListener("click", async () => {
      try { await navigator.clipboard.writeText(msg()); document.getElementById("copied").textContent = "Copied — paste it anywhere."; }
      catch { document.getElementById("copied").textContent = "Select the text above and copy it."; }
    });
    function refreshLinks(){
      document.getElementById("emailBtn").href = `mailto:?subject=${enc("A fire sprinkler tool worth trying")}&body=${enc(msg())}`;
      document.getElementById("smsBtn").href = `sms:?&body=${enc(msg())}`;
    }
    document.getElementById("msg").addEventListener("input", refreshLinks);
    refreshLinks();
    if (navigator.share) {
      // native share sheet on mobile
      const nb = document.createElement("button");
      nb.className = "btn btn-primary"; nb.textContent = "Share…"; nb.style.marginTop = "12px"; nb.style.width = "100%";
      nb.addEventListener("click", () => navigator.share({ title: "SprinkFlow", text: msg(), url: "https://sprinkflow.studio" }).catch(()=>{}));
      document.querySelector(".share-wrap").appendChild(nb);
    }
  </script>
</body>
</html>
